<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Understand-Anything - Interactive Knowledge Graph Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12.11.2/dist/style.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .react-flow__node { padding: 10px 15px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .custom-node { background: white; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .custom-node.api { border-left: 4px solid #8b5cf6; }
    .custom-node.service { border-left: 4px solid #3b82f6; }
    .custom-node.data { border-left: 4px solid #10b981; }
    .custom-node.ui { border-left: 4px solid #f59e0b; }
    .custom-node.utility { border-left: 4px solid #6b7280; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root" style="width: 100vw; height: 100vh;"></div>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12.11.2"
    }
  }
  </script>
  
  <script type="module">
    import React, { useState, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ReactFlow, 
      Background, 
      Controls, 
      MiniMap, 
      Panel,
      Handle,
      Position,
      useNodesState, 
      useEdgesState
    } from '@xyflow/react';

    const NODES = [
      { id: '1', type: 'custom', position: { x: 100, y: 50 }, data: { label: 'api/routes.ts', layer: 'api' }, sourcePosition: Position.Bottom },
      { id: '2', type: 'custom', position: { x: 100, y: 150 }, data: { label: 'handleAuth()', layer: 'api' }, sourcePosition: Position.Bottom, targetPosition: Position.Top },
      { id: '3', type: 'custom', position: { x: 100, y: 250 }, data: { label: 'UserService', layer: 'service' }, sourcePosition: Position.Bottom, targetPosition: Position.Top },
      { id: '4', type: 'custom', position: { x: 100, y: 350 }, data: { label: 'findById()', layer: 'data' }, sourcePosition: Position.Bottom, targetPosition: Position.Top },
      { id: '5', type: 'custom', position: { x: 100, y: 450 }, data: { label: 'UserRepository', layer: 'data' }, sourcePosition: Position.Bottom },
      { id: '6', type: 'custom', position: { x: 300, y: 150 }, data: { label: 'handleUsers()', layer: 'api' }, sourcePosition: Position.Bottom, targetPosition: Position.Top },
      { id: '7', type: 'custom', position: { x: 300, y: 250 }, data: { label: 'createUser()', layer: 'service' }, sourcePosition: Position.Bottom, targetPosition: Position.Top },
      { id: '8', type: 'custom', position: { x: 300, y: 350 }, data: { label: 'saveUser()', layer: 'data' }, sourcePosition: Position.Bottom, targetPosition: Position.Top },
      { id: '9', type: 'custom', position: { x: 500, y: 250 }, data: { label: 'UserList', layer: 'ui' }, sourcePosition: Position.Bottom, targetPosition: Position.Top },
      { id: '10', type: 'custom', position: { x: 300, y: 450 }, data: { label: 'models/user.ts', layer: 'data' }, sourcePosition: Position.Bottom },
    ];

    const EDGES = [
      { id: 'e1-2', source: '1', target: '2', animated: true, style: { stroke: '#8b5cf6' } },
      { id: 'e2-3', source: '2', target: '3', animated: true, style: { stroke: '#8b5cf6' } },
      { id: 'e3-4', source: '3', target: '4', animated: true, style: { stroke: '#3b82f6' } },
      { id: 'e4-5', source: '4', target: '5', animated: true, style: { stroke: '#10b981' } },
      { id: 'e6-7', source: '6', target: '7', animated: true, style: { stroke: '#8b5cf6' } },
      { id: 'e7-8', source: '7', target: '8', animated: true, style: { stroke: '#3b82f6' } },
      { id: 'e8-10', source: '8', target: '10', animated: true, style: { stroke: '#10b981' } },
      { id: 'e9-3', source: '9', target: '3', animated: true, style: { stroke: '#f59e0b' } },
    ];

    const layerColors = {
      api: { bg: '#f3e8ff', border: '#8b5cf6' },
      service: { bg: '#dbeafe', border: '#3b82f6' },
      data: { bg: '#d1fae5', border: '#10b981' },
      ui: { bg: '#fef3c7', border: '#f59e0b' },
      utility: { bg: '#f3f4f6', border: '#6b7280' },
    };

    function CustomNode({ data }) {
      const colors = layerColors[data.layer] || layerColors.utility;
      return React.createElement('div', {
        className: 'custom-node ' + data.layer,
        style: { background: colors.bg, borderColor: colors.border }
      }, [
        React.createElement(Handle, { key: 't', type: 'target', position: Position.Top }),
        React.createElement('div', { key: 'l', className: 'font-semibold' }, data.label),
        React.createElement('div', { key: 's', className: 'text-xs text-gray-500 uppercase' }, data.layer),
        React.createElement(Handle, { key: 's2', type: 'source', position: Position.Bottom })
      ]);
    }

    const nodeTypes = { custom: CustomNode };

    function App() {
      const [nodes, setNodes, onNodesChange] = useNodesState(NODES);
      const [edges, setEdges, onEdgesChange] = useEdgesState(EDGES);
      const [selectedNode, setSelectedNode] = useState(null);

      const onNodeClick = useCallback((event, node) => {
        setSelectedNode(node);
      }, []);

      const onPaneClick = useCallback(() => {
        setSelectedNode(null);
      }, []);

      return React.createElement('div', { style: { width: '100%', height: '100%' } },
        React.createElement(ReactFlow, {
          nodes,
          edges,
          onNodesChange,
          onEdgesChange,
          onNodeClick,
          onPaneClick,
          nodeTypes,
          fitView: true
        }, [
          React.createElement(Background, { key: 'bg', variant: 'dots', gap: 20, size: 1 }),
          React.createElement(Controls, { key: 'ctrl' }),
          React.createElement(MiniMap, { 
            key: 'mm', 
            nodeColor: (n) => layerColors[n.data?.layer]?.border || '#6b7280' 
          }),
          React.createElement(Panel, { key: 'p1', position: 'top-left' },
            React.createElement('div', { className: 'bg-white p-4 rounded-lg shadow-lg' }, [
              React.createElement('h1', { key: 't', className: 'font-bold text-lg mb-2' }, 'Understand-Anything'),
              React.createElement('p', { key: 'd', className: 'text-sm text-gray-600' }, 'Click on nodes to explore')
            ])
          ),
          selectedNode && React.createElement(Panel, { key: 'p2', position: 'top-right' },
            React.createElement('div', { className: 'bg-white p-4 rounded-lg shadow-lg w-64' }, [
              React.createElement('h2', { key: 'h', className: 'font-bold mb-2' }, 'Node Details'),
              React.createElement('p', { key: 'n' }, React.createElement('strong', null, 'Name: '), selectedNode.data.label),
              React.createElement('p', { key: 'l' }, React.createElement('strong', null, 'Layer: '), selectedNode.data.layer),
              React.createElement('p', { key: 'i' }, React.createElement('strong', null, 'ID: '), selectedNode.id)
            ])
          ),
          React.createElement(Panel, { key: 'p3', position: 'bottom-left' },
            React.createElement('div', { className: 'bg-indigo-500 text-white px-4 py-2 rounded-lg shadow-lg text-sm' },
              React.createElement('span', { className: 'font-semibold' }, 'Live Demo')
            )
          )
        ])
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
